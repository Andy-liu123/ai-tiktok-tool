<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TikTok Script Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        textarea {
            min-height: 200px;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            margin: 1rem 0;
            color: #667eea;
            display: none;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin: 1rem 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI TikTok Script Generator</h1>
        <div class="input-group">
            <label for="topic">Video Topic (e.g., skincare routine, funny cat videos)</label>
            <input type="text" id="topic" placeholder="Enter your video topic here...">
        </div>
        <button id="generateBtn">Generate TikTok Script</button>
        <div class="loading" id="loading">Generating your script...</div>
        <div class="error" id="error">Oops! Something went wrong. Please try again.</div>
        <div class="input-group" style="margin-top: 1.5rem;">
            <label for="result">Generated Script</label>
            <textarea id="result" readonly></textarea>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const topicInput = document.getElementById('topic');
        const resultTextarea = document.getElementById('result');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        generateBtn.addEventListener('click', async () => {
            const topic = topicInput.value.trim();
            if (!topic) {
                alert('Please enter a video topic!');
                return;
            }

            loading.style.display = 'block';
            error.style.display = 'none';
            resultTextarea.value = '';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ topic })
                });

                if (!response.ok) {
                    throw new Error('Failed to generate script');
                }

                const data = await response.json();
                resultTextarea.value = data.script;
            } catch (err) {
                error.style.display = 'block';
                console.error(err);
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
